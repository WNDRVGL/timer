<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pixel Hourglass Timer</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --soft:rgba(255,255,255,.18);
    }
    html,body{
      margin:0;
      height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Always smartphone-sized layout even on PC */
    .phone {
      width: min(420px, 100vw);
      height: 100vh;
      margin: 0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      padding: 18px 14px calc(18px + env(safe-area-inset-bottom));
      box-sizing:border-box;
    }

    .screen{
      width:100%;
      height:100%;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:16px;
    }
    .screen.active{ display:flex; }

    .title{
      font-size:14px;
      letter-spacing:.08em;
      color:var(--muted);
      margin-top: env(safe-area-inset-top);
      user-select:none;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      padding: 10px 6px;
      box-sizing:border-box;
    }

    .timeBtn{
      border:1px solid var(--soft);
      background:transparent;
      color:var(--fg);
      padding:14px 10px;

      letter-spacing:.02em;
      cursor:pointer;
      user-select:none;
    }
    .timeBtn:active{ transform: scale(.98); border-color: rgba(255,255,255,.35); }

    /* Timer screen */
    .canvasWrap{
      width:100%;
      flex: 1 1 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    /* Hourglass visual area is 900px square internally; scale down to fit phone */
    .glassWrap{
      width: min(900px, 100%);
      aspect-ratio: 1 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
      transform: rotate(0deg);
      transition: transform 520ms cubic-bezier(.2,.8,.2,1);

</head>
<body>
  <div class="phone">

    <!-- Screen: Select duration -->
    <section id="screenSelect" class="screen active" aria-label="タイマー選択">
      <div class="title">PIXEL HOURGLASS TIMER</div>
      <div class="grid" role="list">
        <button class="timeBtn" data-sec="60">60秒</button>
        <button class="timeBtn" data-sec="120">120秒</button>
        <button class="timeBtn" data-sec="150">150秒</button>
        <button class="timeBtn" data-sec="180">180秒</button>
        <button class="timeBtn" data-sec="300">5分</button>
        <button class="timeBtn" data-sec="600">10分</button>
      </div>
      <div class="hint">時間をタップすると砂時計へ</div>
    </section>

    <!-- Screen: Hourglass -->
    <section id="screenTimer" class="screen" aria-label="砂時計">
      <div class="canvasWrap">
        <div id="glassWrap" class="glassWrap" aria-hidden="true">
          <canvas id="c" width="900" height="900"></canvas>
        </div>

        <!-- Controls (appear when NOT running, hide while running) -->
        <div id="controls" class="controls">
          <button id="btnStart" class="ctrlBtn" type="button" aria-label="スタート">
            <span class="ctrlIcon iconPlay" aria-hidden="true"></span>
            <span>スタート</span>
          </button>
          <button id="btnSelect" class="ctrlBtn" type="button" aria-label="タイマー選択">
            <span class="ctrlIcon iconGrid" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </span>
            <span>タイマー選択</span>
          </button>
        </div>
      </div>
    </section>

  </div>

  <script>
  (() => {
    // ========== DOM ==========
    const screenSelect = document.getElementById('screenSelect');
    const screenTimer  = document.getElementById('screenTimer');
    const glassWrap    = document.getElementById('glassWrap');
    const controls     = document.getElementById('controls');
    const btnStart     = document.getElementById('btnStart');
    const btnSelect    = document.getElementById('btnSelect');
    const canvas       = document.getElementById('c');
    const ctx          = canvas.getContext('2d', { alpha:false });

    // ========== Constants ==========
    const SIZE = 900;         // hourglass image size (900px)
    const PX   = 4;           // particle block size (4x4)
    const STEP = PX;          // snap grid

    const DURATIONS = [60,120,150,180,300,600];

    // Hourglass geometry within 900x900
    const pad = 70;
    const topY = pad;
    const botY = SIZE - pad;
    const midY = SIZE/2;
    const cx = SIZE/2;

    const maxHalf = (SIZE - pad*2)/2;   // widest half-width
    const neckW = 56;                   // waist opening width
    const neckHalf = neckW/2;
    const neckH = 110;                  // neck vertical thickness
    const neckTop = midY - neckH/2;
    const neckBot = midY + neckH/2;

    // Simulation tuning
    const gravity = 1400;               // px/s^2 in 900px space
    const vyCap = 1800;
    const vxCap = 250;

    // ========== State ==========
    let selectedSec = 150;

    let running = false;
    let flipping = false;
    let flipped = false;

    let startTs = 0;
    let endTs = 0;

    // Blocks
    // falling blocks: {x,y,vx,vy}
    const falling = [];

    // Bottom pile occupancy: key "x,y" => true (snapped to 4px)
    const occ = new Set();

    // Count of settled blocks (bottom pile)
    let settledCount = 0;

    // Total blocks we will move each run
    let TOTAL = 0;

    // Release control (ensures all blocks move by selected time)
    let released = 0;        // how many blocks have been emitted from top
    let releaseAcc = 0;      // fractional accumulator

    // Top chamber "inventory" (just counts; positions are generated on release)
    let topRemaining = 0;

    // ========== Helpers ==========
    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    const now = () => performance.now();

    function showScreen(which){
      if(which === 'select'){
        screenSelect.classList.add('active');
        screenTimer.classList.remove('active');
      }else{
        screenSelect.classList.remove('active');
        screenTimer.classList.add('active');
      }
    }

    function setControlsVisible(v){
      controls.classList.toggle('hidden', !v);
    }

    function snap(v){
      return Math.round(v / STEP) * STEP;
    }

    function xBoundsAtY(y){
      // symmetric linear taper to neck at mid, then widen
      let half;
      if (y <= midY){
        const tt = (y - topY) / (midY - topY);
        half = maxHalf - (maxHalf - neckHalf) * tt;
      } else {
        const tt = (y - midY) / (botY - midY);
        half = neckHalf + (maxHalf - neckHalf) * tt;
      }
      return { lx: cx - half, rx: cx + half };
    }

    function inGlass(x,y){
      if(y < topY || y > botY) return false;
      const b = xBoundsAtY(y);
      return (x >= b.lx && x <= b.rx);
    }

    function inNeck(x,y){
      return (y >= neckTop && y <= neckBot && Math.abs(x - cx) <= neckHalf);
    }

    function roundRectStroke(x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,  x+w,y+h, r);
      ctx.arcTo(x+w,y+h,x,  y+h, r);
      ctx.arcTo(x,  y+h,x,  y,   r);
      ctx.arcTo(x,  y,  x+w,y,   r);
      ctx.closePath();
      ctx.stroke();
    }

    function drawOutline(){
      // black background
      ctx.fillStyle = "#000";
      ctx.fillRect(0,0,SIZE,SIZE);

      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // outer frame
      roundRectStroke(18, 18, SIZE-36, SIZE-36, 44);

      // hourglass border
      ctx.beginPath();
      ctx.moveTo(xBoundsAtY(topY).lx, topY);
      ctx.lineTo(xBoundsAtY(midY).lx, midY);
      ctx.lineTo(xBoundsAtY(botY).lx, botY);
      ctx.lineTo(xBoundsAtY(botY).rx, botY);
      ctx.lineTo(xBoundsAtY(midY).rx, midY);
      ctx.lineTo(xBoundsAtY(topY).rx, topY);
      ctx.closePath();
      ctx.stroke();

      // "separated space" feel: draw a thin horizontal divider near neck edges
      // and emphasize the neck opening lines
      ctx.beginPath();
      ctx.moveTo(cx - neckHalf, neckTop);
      ctx.lineTo(cx + neckHalf, neckTop);
      ctx.moveTo(cx - neckHalf, neckBot);
      ctx.lineTo(cx + neckHalf, neckBot);
      ctx.stroke();

      // subtle divider lines in the chambers (optional but helps "split")
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.moveTo(xBoundsAtY(midY-6).lx, midY-6);
      ctx.lineTo(cx - neckHalf, midY-6);
      ctx.moveTo(cx + neckHalf, midY-6);
      ctx.lineTo(xBoundsAtY(midY-6).rx, midY-6);
      ctx.moveTo(xBoundsAtY(midY+6).lx, midY+6);
      ctx.lineTo(cx - neckHalf, midY+6);
      ctx.moveTo(cx + neckHalf, midY+6);
      ctx.lineTo(xBoundsAtY(midY+6).rx, midY+6);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawBlocks(){
      ctx.fillStyle = "#fff";

      // Bottom pile (settled) from occupancy set
      for(const key of occ){
        const [x,y] = key.split(',').map(Number);
        ctx.fillRect(x, y, PX, PX);
      }

      // Falling blocks
      for(const b of falling){
        ctx.fillRect(b.x, b.y, PX, PX);
      }

      // Top chamber "remaining" is visualized by packing a static pile (not individually simulated)
      // We draw it as a compact block mass so it looks like pixels are "stored" up top.
      if(!running){
        // when not running we show "sand at bottom" only (spec initial)
        return;
      }
      // while running, show remaining pile in top chamber (simple packed rows)
      const remaining = topRemaining;
      if(remaining <= 0) return;

      const yStart = topY + 16;
      const yEnd = neckTop - 10;

      let drawn = 0;
      for(let y = yEnd; y >= yStart && drawn < remaining; y -= STEP){
        const b = xBoundsAtY(y);
        const lx = b.lx + 10;
        const rx = b.rx - 10;
        for(let x = lx; x <= rx && drawn < remaining; x += STEP){
          const sx = snap(x);
          const sy = snap(y);
          // don't draw inside neck
          if(inNeck(sx+PX/2, sy+PX/2)) continue;
          ctx.fillRect(sx, sy, PX, PX);
          drawn++;
        }
      }
    }

    function resetAll(){
      running = false;
      flipping = false;
      released = 0;
      releaseAcc = 0;
      topRemaining = 0;
      settledCount = 0;
      falling.length = 0;
      occ.clear();
      setControlsVisible(true);
      glassWrap.classList.toggle('flipped', flipped); // keep visual state
      render();
    }

    // Pack all sand at bottom (initial state in timer screen)
    function packBottomAll(){
      occ.clear();
      falling.length = 0;
      settledCount = 0;

      // estimate TOTAL based on bottom chamber usable area; keep it stable per session
      // We'll fill up to a modest height for nice look.
      const maxBlocks = 1800; // cap for performance
      const yStart = botY - 14;
      const yEnd   = midY + neckH/2 + 10;

      let count = 0;
      for(let y = yStart; y >= yEnd && count < maxBlocks; y -= STEP){
        const b = xBoundsAtY(y);
        const lx = snap(b.lx + 12);
        const rx = snap(b.rx - 12);
        for(let x = lx; x <= rx && count < maxBlocks; x += STEP){
          const sx = snap(x);
          const sy = snap(y);
          if(!inGlass(sx+PX/2, sy+PX/2)) continue;
          // only bottom chamber
          if(sy < neckBot + 8) continue;
          occ.add(`${sx},${sy}`);
          count++;
        }
      }
      TOTAL = count;
      settledCount = count;

      // in this state, everything is in bottom, top is empty
      topRemaining = 0;
      released = TOTAL;
    }

    // Start a run: all blocks should move from TOP to BOTTOM within selectedSec
    function beginRun(){
      running = true;
      setControlsVisible(false);

      const t = now();
      startTs = t;
      endTs = t + selectedSec * 1000;

      // Move all sand to TOP chamber inventory (visual pile)
      // and clear bottom pile to accumulate during run.
      occ.clear();
      falling.length = 0;

      settledCount = 0;
      released = 0;
      releaseAcc = 0;

      topRemaining = TOTAL;
    }

    function stopRunAndShowControls(){
      running = false;
      setControlsVisible(true);

      // If any blocks still falling, instantly settle them to guarantee "all moved" feel
      for(const b of falling){
        settleBlock(b.x, b.y);
      }
      falling.length = 0;

      topRemaining = 0;        // all moved
      released = TOTAL;
      releaseAcc = 0;
    }

    // Spawn one block from upper chamber into the falling stream
    function emitOne(){
      if(topRemaining <= 0) return;

      // Emit near center, slightly jitter, above neck so it visibly falls
      const xJ = (Math.random() - 0.5) * (neckW * 0.55);
      const x = snap(cx + xJ);
      const y = snap(neckTop - 28 - Math.random()*32);

      falling.push({
        x: clamp(x, 0, SIZE-PX),
        y: clamp(y, 0, SIZE-PX),
        vx: (Math.random()-0.5) * 60,
        vy: 0
      });

      topRemaining--;
      released++;
    }

    // Find the first collision position and settle into occupancy
    function settleBlock(x,y){
      // Snap to grid
      let sx = snap(x);
      let sy = snap(y);

      // Keep within bottom chamber and inside glass
      if(sy < neckBot + 8) sy = snap(neckBot + 8);
      sy = clamp(sy, 0, SIZE-PX);

      // Clamp x inside walls for this y
      const b = xBoundsAtY(sy + PX/2);
      const minX = snap(b.lx + 10);
      const maxX = snap(b.rx - 10);
      sx = clamp(sx, minX, maxX);

      // Drop down (increase y) until it rests on something or bottom boundary
      // But we settle on the "pile" upward from bottom, so we should drop until collision.
      while(true){
        const key = `${sx},${sy}`;
        if(!inGlass(sx+PX/2, sy+PX/2) || sy > botY - PX - 6){
          sy = snap(botY - PX - 6);
          break;
        }
        // if occupied, move up one cell
        if(occ.has(key)){
          sy -= STEP;
          continue;
        }
        // check the cell below: if below is out of glass OR occupied OR beyond bottom => rest here
        const belowY = sy + STEP;
        if(belowY > botY - PX - 6){
          break;
        }
        const belowKey = `${sx},${belowY}`;
        if(!inGlass(sx+PX/2, belowY+PX/2) || occ.has(belowKey)){
          break;
        }
        // otherwise fall one step
        sy = belowY;
      }

      const finalKey = `${sx},${sy}`;
      if(!occ.has(finalKey)){
        occ.add(finalKey);
        settledCount++;
      }else{
        // rare: if already occupied, try nudge sideways a bit
        for(const dx of [STEP, -STEP, STEP*2, -STEP*2]){
          const nx = sx + dx;
          const nk = `${nx},${sy}`;
          if(!occ.has(nk) && inGlass(nx+PX/2, sy+PX/2)){
            occ.add(nk);
            settledCount++;
            return;
          }
        }
      }
    }

    function update(dt){
      if(!running) return;

      // Release rate ensures ALL blocks move within selected time
      const rate = TOTAL / selectedSec;        // blocks per second
      releaseAcc += rate * dt;
      while(releaseAcc >= 1 && topRemaining > 0){
        emitOne();
        releaseAcc -= 1;
      }

      // Update falling blocks
      for(let i = falling.length - 1; i >= 0; i--){
        const b = falling[i];

        b.vy = clamp(b.vy + gravity * dt, -vyCap, vyCap);

        // steer into neck if above it
        if(b.y < neckTop){
          b.vx += (cx - (b.x + PX/2)) * 0.6 * dt;
        }

        // constrain while in neck (tight)
        if(inNeck(b.x + PX/2, b.y + PX/2)){
          b.x = clamp(b.x, cx - neckHalf + 2, cx + neckHalf - PX - 2);
          b.vy = Math.max(b.vy, 650);
          b.vx *= 0.6;
        }

        // integrate
        b.vx = clamp(b.vx + (Math.random()-0.5) * 40 * dt, -vxCap, vxCap);
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // walls constraint
        const bb = xBoundsAtY(b.y + PX/2);
        const minX = bb.lx + 10;
        const maxX = bb.rx - 10 - PX;
        b.x = clamp(b.x, minX, maxX);

        // bottom chamber collision: if at/below bottom boundary OR hits pile, settle
        // Check snapped position and below cell
        if(b.y + PX >= botY - 6){
          settleBlock(b.x, b.y);
          falling.splice(i,1);
          continue;
        }

        if(b.y > neckBot + 8){
          const sx = snap(b.x);
          const sy = snap(b.y);
          const belowKey = `${sx},${sy + STEP}`;
          // if the cell below is occupied, settle here
          if(occ.has(belowKey)){
            settleBlock(sx, sy);
            falling.splice(i,1);
            continue;
          }
        }
      }

      // End condition:
      // - time reached OR all blocks settled in bottom
      const t = now();
      const allMoved = (settledCount >= TOTAL) && (topRemaining === 0) && (falling.length === 0);

      if(t >= endTs || allMoved){
        // Guarantee all moved on end: dump remaining into pile
        while(topRemaining > 0){
          // settle directly into bottom without animation to finish cleanly
          const xJ = (Math.random() - 0.5) * (maxHalf * 0.9);
          settleBlock(cx + xJ, neckBot + 30);
          topRemaining--;
        }
        // settle any stragglers
        stopRunAndShowControls();
      }
    }

    function render(){
      drawOutline();
      // draw top pile only while running; initial timer screen should show bottom-full.
      drawBlocks();
    }

    // Main loop
    let last = now();
    function tick(){
      const t = now();
      const dt = clamp((t - last) / 1000, 0, 0.033);
      last = t;
      update(dt);
      render();
      requestAnimationFrame(tick);
    }

    // Flip + start flow
    function startWithFlip(){
      if(flipping || running) return;
      flipping = true;

      flipped = !flipped;
      glassWrap.classList.toggle('flipped', flipped);

      const onDone = () => {
        glassWrap.removeEventListener('transitionend', onDone);
        // After flip, begin run where sand starts in TOP and ends in BOTTOM
        beginRun();
        flipping = false;
      };
      glassWrap.addEventListener('transitionend', onDone, { once:true });

      // Fallback
      setTimeout(() => {
        if(flipping){
          try { glassWrap.removeEventListener('transitionend', onDone); } catch(e){}
          beginRun();
          flipping = false;
        }
      }, 700);
    }

    // ========== UI wiring ==========
    document.querySelectorAll('.timeBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sec = Number(btn.dataset.sec);
        if(!DURATIONS.includes(sec)) return;
        selectedSec = sec;

        showScreen('timer');

        // Initial timer screen: sand is already at bottom (spec)
        resetAll();
        packBottomAll();
        render();
      }, { passive:true });
    });

    btnStart.addEventListener('click', () => {
      // Start icon -> flip clockwise and start; icons disappear while running
      startWithFlip();
    }, { passive:true });

    btnSelect.addEventListener('click', () => {
      // Timer select -> back to selection screen
      running = false;
      flipping = false;
      setControlsVisible(true);
      showScreen('select');
    }, { passive:true });

    // prevent scroll on mobile
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive:false });

    // Init
    // (Reload naturally returns to selection screen)
    tick();
  })();
  </script>
</body>
</html>
