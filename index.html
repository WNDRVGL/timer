<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Falling Blocks Timer</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --thin:rgba(255,255,255,.22);
      --card:rgba(255,255,255,.06);
      --pad:16px;
      --radius:18px;
      --w: 420px;

      --cols: 10;
      --gap: 6px;
      --block: 16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing: antialiased;
      overflow:hidden;
      touch-action: manipulation;
    }

    .app{
      height:100%;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding: env(safe-area-inset-top) var(--pad) env(safe-area-inset-bottom);
    }
    .shell{
      width:min(100%, var(--w));
      height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 10px 2px 0;
      user-select:none;
    }
    .brand{
      font-weight:650;
      letter-spacing:.08em;
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
    }

    .screen{
      flex:1;
      border:1px solid var(--thin);
      border-radius: var(--radius);
      padding: 14px;
      position:relative;
      overflow:hidden;
    }

    .title{
      margin:2px 0 10px;
      font-size:16px;
      font-weight:650;
    }
    .subtitle{
      margin:0 0 14px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    button{
      appearance:none;
      border:1px solid var(--thin);
      background: var(--card);
      color: var(--fg);
      border-radius: 14px;
      padding: 14px 12px;
      font-size:14px;
      font-weight:650;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
    }
    button:active{ transform: scale(.98); }
    button:hover{ border-color: rgba(255,255,255,.35); }
    button.primary{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.35);
    }
    button.ghost{ background: transparent; }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .hidden{ display:none !important; }

    /* Timer header */
    .timerHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom: 10px;
    }
    .timerLabel{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .timerValue{
      font-size:14px;
      font-weight:700;
      margin-top:2px;
    }

    /* Field */
    .field{
      position:absolute;
      left:14px; right:14px;
      top:58px; bottom:78px;
      border:1px solid var(--thin);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(255,255,255,.03);
    }

    .piles{
      position:absolute;
      inset:0;
      padding: 12px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap: 10px;
      pointer-events:none;
    }

    .pileBox{
      height: 46%;
      display:flex;
      flex-direction:column;
      min-height: 0;
    }

    .binLabel{
      font-size:10px;
      color:rgba(255,255,255,.55);
      letter-spacing:.1em;
      text-transform:uppercase;
      text-align:center;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    /* 10 columns layout */
    .blockGrid{
      flex: 1 1 auto;
      display:grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: var(--gap);
      align-content:start;
      justify-items:center;
      overflow:hidden;
      min-height: 0;
    }

    .slot{
      width: var(--block);
      height: var(--block);
      border-radius: 4px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.08);
    }
    .slot.filled{
      background: var(--fg);
      border-color: transparent;
    }

    .falling{
      position:absolute;
      width: var(--block);
      height: var(--block);
      border-radius: 4px;
      background: var(--fg);
      left:0; top:0;
      pointer-events:none;
      will-change: transform;
    }

    .hint{
      position:absolute;
      left:0; right:0;
      top: 50%;
      transform: translateY(-50%);
      text-align:center;
      color: rgba(255,255,255,.70);
      font-size:12px;
      letter-spacing:.06em;
      text-transform:uppercase;
      user-select:none;
      pointer-events:none;
    }

    .controls{
      position:absolute;
      left:14px; right:14px;
      bottom:14px;
      display:flex;
      gap:10px;
    }
    .controls button{ flex:1; padding: 14px 12px; }

    .overlay{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.78);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
    }
    .overlayCard{
      width: min(100%, 360px);
      border:1px solid rgba(255,255,255,.28);
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      padding: 16px;
      text-align:center;
    }
    .overlayTitle{
      font-size:16px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin: 2px 0 6px;
    }
    .overlaySub{
      font-size:12px;
      color: var(--muted);
      margin: 0 0 14px;
      line-height:1.4;
    }
    .overlayButtons{
      display:flex;
      gap:10px;
    }
    .overlayButtons button{ flex:1; }

    /* Make blocks fit nicely to available height */
    @media (min-width: 760px){
      .screen{ box-shadow: 0 20px 60px rgba(0,0,0,.55); }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="shell">
      <div class="topbar">
        <div class="brand">Falling Blocks Timer</div>
        <div class="brand" id="statusText">READY</div>
      </div>

      <!-- SETTINGS -->
      <section class="screen" id="settingsScreen">
        <div class="title">Select Duration</div>
        <div class="subtitle">
          Blocks fall from the top pile to the bottom pile.<br/>
          When all blocks have fallen, the timer ends.
        </div>
        <div class="grid" id="durationGrid"></div>
        <div style="margin-top:12px; font-size:11px; color:var(--muted); line-height:1.45;">
          Reload always returns to this screen.
        </div>
      </section>

      <!-- TIMER -->
      <section class="screen hidden" id="timerScreen">
        <div class="timerHeader">
          <div>
            <div class="timerLabel">Duration</div>
            <div class="timerValue" id="durationText">—</div>
          </div>
          <div style="text-align:right;">
            <div class="timerLabel">Progress</div>
            <div class="timerValue" id="progressText">0%</div>
          </div>
        </div>

        <div class="field" id="field">
          <div class="piles">
            <div class="pileBox">
              <div class="binLabel">Top Pile</div>
              <div class="blockGrid" id="topGrid"></div>
            </div>
            <div class="pileBox">
              <div class="binLabel">Bottom Pile</div>
              <div class="blockGrid" id="bottomGrid"></div>
            </div>
          </div>
          <div class="hint" id="hint">Press START</div>
        </div>

        <div class="controls">
          <button class="primary" id="startBtn">START</button>
          <button class="ghost" id="backBtn">BACK</button>
        </div>

        <div class="overlay hidden" id="finishOverlay">
          <div class="overlayCard">
            <div class="overlayTitle">Time's Up</div>
            <div class="overlaySub">All blocks have fallen.</div>
            <div class="overlayButtons">
              <button class="primary" id="restartBtn">RESTART</button>
              <button class="ghost" id="backBtn2">BACK</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

<script>
(() => {
  // ===== Config =====
  const COLS = 10;

  // 10 columns fixed. Rows are chosen to look good and still animate smoothly.
  // 6 rows => 60 blocks (good density, smooth pacing even at 10 min)
  const ROWS = 6;
  const TOTAL = COLS * ROWS;

  const DURATIONS = [
    { label: "30 sec", seconds: 30 },
    { label: "60 sec", seconds: 60 },
    { label: "120 sec", seconds: 120 },
    { label: "150 sec", seconds: 150 },
    { label: "180 sec", seconds: 180 },
    { label: "5 min", seconds: 300 },
    { label: "10 min", seconds: 600 },
  ];

  // ===== Elements =====
  const statusText = document.getElementById("statusText");
  const settingsScreen = document.getElementById("settingsScreen");
  const timerScreen = document.getElementById("timerScreen");
  const durationGrid = document.getElementById("durationGrid");

  const durationText = document.getElementById("durationText");
  const progressText = document.getElementById("progressText");

  const field = document.getElementById("field");
  const topGrid = document.getElementById("topGrid");
  const bottomGrid = document.getElementById("bottomGrid");
  const hint = document.getElementById("hint");

  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");
  const backBtn2 = document.getElementById("backBtn2");
  const restartBtn = document.getElementById("restartBtn");
  const finishOverlay = document.getElementById("finishOverlay");

  // ===== State =====
  let selectedSeconds = null;
  let running = false;
  let finished = false;

  let dropped = 0;
  let dropEveryMs = 0;
  let timerId = null;

  // Slots arrays
  let topSlots = [];
  let bottomSlots = [];

  // ===== Helpers =====
  const pad2 = n => String(n).padStart(2,"0");
  function formatDuration(sec){
    if (sec < 60) return `${sec} sec`;
    const m = Math.floor(sec/60);
    const s = sec%60;
    if (s === 0) return `${m} min`;
    return `${m}:${pad2(s)}`;
  }
  function setStatus(s){ statusText.textContent = s; }
  function updateProgress(){
    const pct = Math.round((dropped / TOTAL) * 100);
    progressText.textContent = `${pct}%`;
  }

  function clearTimer(){
    if (timerId) clearTimeout(timerId);
    timerId = null;
  }

  function stop(){
    running = false;
    clearTimer();
    startBtn.disabled = false;
  }

  function finish(){
    stop();
    finished = true;
    setStatus("DONE");
    finishOverlay.classList.remove("hidden");
  }

  function buildSlots(){
    topGrid.style.setProperty("--cols", COLS);
    bottomGrid.style.setProperty("--cols", COLS);

    topGrid.innerHTML = "";
    bottomGrid.innerHTML = "";
    topSlots = [];
    bottomSlots = [];

    for (let i=0; i<TOTAL; i++){
      const t = document.createElement("div");
      t.className = "slot filled";
      t.dataset.index = i;
      topGrid.appendChild(t);
      topSlots.push(t);

      const b = document.createElement("div");
      b.className = "slot";
      b.dataset.index = i;
      bottomGrid.appendChild(b);
      bottomSlots.push(b);
    }
  }

  function fitBlockSize(){
    // compute block size so ROWS fit in each pile area comfortably
    const fieldRect = field.getBoundingClientRect();
    if (!fieldRect.height) return;

    // each pileBox about 46% of field height; subtract label area
    const pileHeight = fieldRect.height * 0.46;
    const labelSpace = 22 + 10; // label + margin
    const available = pileHeight - labelSpace;

    const gap = 6;
    let size = Math.floor((available - gap*(ROWS-1)) / ROWS);
    size = Math.max(10, Math.min(20, size));

    document.documentElement.style.setProperty("--block", size + "px");
    document.documentElement.style.setProperty("--gap", gap + "px");
  }

  function resetStacks(){
    stop();
    finished = false;
    dropped = 0;
    updateProgress();

    buildSlots();
    fitBlockSize();

    hint.textContent = "Press START";
    hint.classList.remove("hidden");
    finishOverlay.classList.add("hidden");
    setStatus("READY");
  }

  function showSettings(){
    stop();
    selectedSeconds = null;
    settingsScreen.classList.remove("hidden");
    timerScreen.classList.add("hidden");
    setStatus("READY");
  }

  function showTimer(sec){
    stop();
    selectedSeconds = sec;

    settingsScreen.classList.add("hidden");
    timerScreen.classList.remove("hidden");

    durationText.textContent = formatDuration(sec);
    resetStacks();
  }

  function topNextIndex(){
    // take from the end, skipping already emptied slots
    for (let i = TOTAL - 1; i >= 0; i--){
      if (topSlots[i].classList.contains("filled")) return i;
    }
    return -1;
  }

  function bottomTargetIndex(){
    // fill from the end backwards so it visually "accumulates"
    return (TOTAL - 1) - dropped;
  }

  function animateDrop(fromSlot, toSlot){
    const fieldRect = field.getBoundingClientRect();
    const fromRect = fromSlot.getBoundingClientRect();
    const toRect = toSlot.getBoundingClientRect();

    // create absolute "falling" block
    const falling = document.createElement("div");
    falling.className = "falling";
    field.appendChild(falling);

    // initial position
    const x0 = fromRect.left - fieldRect.left;
    const y0 = fromRect.top  - fieldRect.top;
    falling.style.transform = `translate(${x0}px, ${y0}px)`;

    // remove from top immediately
    fromSlot.classList.remove("filled");

    // target position
    const x1 = toRect.left - fieldRect.left;
    const y1 = toRect.top  - fieldRect.top;

    // duration: a bit shorter than interval, but never too tiny
    const dur = Math.max(220, Math.min(650, dropEveryMs * 0.65));

    // animate via transform (GPU-friendly)
    requestAnimationFrame(() => {
      falling.style.transition = `transform ${dur}ms cubic-bezier(.2,.9,.2,1)`;
      falling.style.transform = `translate(${x1}px, ${y1}px)`;
    });

    // land
    setTimeout(() => {
      falling.remove();
      toSlot.classList.add("filled");
    }, dur + 10);

    return dur;
  }

  function step(){
    if (!running) return;

    const fromIdx = topNextIndex();
    if (fromIdx < 0){
      finish();
      return;
    }
    const toIdx = bottomTargetIndex();
    const fromSlot = topSlots[fromIdx];
    const toSlot = bottomSlots[toIdx];

    // schedule
    animateDrop(fromSlot, toSlot);

    dropped++;
    updateProgress();

    if (dropped >= TOTAL){
      // let the last animation finish a bit, then show overlay
      timerId = setTimeout(() => finish(), 260);
      return;
    }

    timerId = setTimeout(step, dropEveryMs);
  }

  function start(){
    if (!selectedSeconds) return;
    if (running) return;

    if (finished){
      resetStacks();
    }

    running = true;
    finished = false;
    setStatus("RUNNING");
    hint.classList.add("hidden");
    finishOverlay.classList.add("hidden");
    startBtn.disabled = true;

    dropEveryMs = (selectedSeconds * 1000) / TOTAL;

    // first drop immediately
    step();
  }

  // ===== Build settings UI =====
  function buildDurationButtons(){
    durationGrid.innerHTML = "";
    DURATIONS.forEach(d => {
      const btn = document.createElement("button");
      btn.textContent = d.label.toUpperCase();
      btn.addEventListener("click", () => showTimer(d.seconds));
      durationGrid.appendChild(btn);
    });
  }

  // ===== Events =====
  startBtn.addEventListener("click", start);
  backBtn.addEventListener("click", showSettings);
  backBtn2.addEventListener("click", showSettings);
  restartBtn.addEventListener("click", () => { resetStacks(); start(); });

  window.addEventListener("resize", () => {
    if (!timerScreen.classList.contains("hidden")){
      fitBlockSize();
    }
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && running){
      stop();
      setStatus("PAUSED");
      hint.textContent = "Paused (tab hidden)";
      hint.classList.remove("hidden");
    }
  });

  // ===== Init =====
  buildDurationButtons();
  showSettings();
})();
</script>
</body>
</html>
