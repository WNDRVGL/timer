<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Falling Blocks Timer</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --thin:rgba(255,255,255,.22);
      --card:rgba(255,255,255,.06);
      --pad:16px;
      --radius:18px;
      --w: 420px;
      --block: 16px;
      --gap: 6px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing: antialiased;
      overflow:hidden;
      touch-action: manipulation;
    }
    .app{
      height:100%;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding: env(safe-area-inset-top) var(--pad) env(safe-area-inset-bottom);
    }
    .shell{
      width:min(100%, var(--w));
      height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 10px 2px 0;
      user-select:none;
    }
    .brand{
      font-weight:650;
      letter-spacing:.08em;
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
    }
    .screen{
      flex:1;
      border:1px solid var(--thin);
      border-radius: var(--radius);
      padding: 14px;
      position:relative;
      overflow:hidden;
    }
    .title{
      margin:2px 0 10px;
      font-size:16px;
      font-weight:650;
      letter-spacing:.02em;
    }
    .subtitle{
      margin:0 0 14px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    button{
      appearance:none;
      border:1px solid var(--thin);
      background: var(--card);
      color: var(--fg);
      border-radius: 14px;
      padding: 14px 12px;
      font-size:14px;
      font-weight:650;
      letter-spacing:.02em;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
    }
    button:active{ transform: scale(.98); }
    button:hover{ border-color: rgba(255,255,255,.35); }
    button.primary{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.35);
    }
    button.ghost{ background: transparent; }

    .hidden{ display:none !important; }

    /* Timer layout */
    .timerHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom: 10px;
    }
    .timerLabel{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .timerValue{
      font-size:14px;
      font-weight:700;
      margin-top:2px;
    }

    .field{
      position:absolute;
      left:14px; right:14px;
      top:58px; bottom:78px;
      border:1px solid var(--thin);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(255,255,255,.03);
    }

    .binLabel{
      font-size:10px;
      color:rgba(255,255,255,.55);
      letter-spacing:.1em;
      text-transform:uppercase;
      margin-bottom:8px;
      text-align:center;
    }

    .piles{
      position:absolute;
      inset:0;
      padding: 12px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      pointer-events:none;
    }

    .pileBox{
      height:46%;
      display:flex;
      flex-direction:column;
    }

    .stack{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: var(--gap);
      overflow:hidden;
    }
    .stack.top{ justify-content:flex-start; }
    .stack.bottom{ justify-content:flex-end; }

    .block{
      width: var(--block);
      height: var(--block);
      border-radius: 4px;
      background: var(--fg);
      flex: 0 0 auto;
    }

    /* Falling block overlay (absolute inside .field) */
    .falling{
      position:absolute;
      left:50%;
      transform: translateX(-50%);
      width: var(--block);
      height: var(--block);
      border-radius: 4px;
      background: var(--fg);
      pointer-events:none;
      will-change: top;
    }

    .hint{
      position:absolute;
      left:0; right:0;
      top: 50%;
      transform: translateY(-50%);
      text-align:center;
      color: rgba(255,255,255,.70);
      font-size:12px;
      letter-spacing:.06em;
      text-transform:uppercase;
      user-select:none;
      pointer-events:none;
    }

    .controls{
      position:absolute;
      left:14px; right:14px;
      bottom:14px;
      display:flex;
      gap:10px;
    }
    .controls button{ flex:1; padding: 14px 12px; }

    .overlay{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.78);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
    }
    .overlayCard{
      width: min(100%, 360px);
      border:1px solid rgba(255,255,255,.28);
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      padding: 16px;
      text-align:center;
    }
    .overlayTitle{
      font-size:16px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin: 2px 0 6px;
    }
    .overlaySub{
      font-size:12px;
      color: var(--muted);
      margin: 0 0 14px;
      line-height:1.4;
    }
    .overlayButtons{
      display:flex;
      gap:10px;
    }
    .overlayButtons button{ flex:1; }

    /* Error toast */
    .errorToast{
      position:absolute;
      left:14px; right:14px;
      top:14px;
      border:1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      color: rgba(255,255,255,.9);
      line-height: 1.35;
      display:none;
      white-space: pre-wrap;
    }

    @media (min-width: 760px){
      .screen{ box-shadow: 0 20px 60px rgba(0,0,0,.55); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <div class="topbar">
        <div class="brand">Falling Blocks Timer</div>
        <div class="brand" id="statusText">READY</div>
      </div>

      <!-- SETTINGS -->
      <section class="screen" id="settingsScreen">
        <div class="title">Select Duration</div>
        <div class="subtitle">
          Blocks fall from the top pile to the bottom pile.<br/>
          When all blocks have fallen, the timer ends.
        </div>
        <div class="grid" id="durationGrid"></div>
        <div style="margin-top:12px; font-size:11px; color:var(--muted); line-height:1.45;">
          Reload always returns to this screen.
        </div>
      </section>

      <!-- TIMER -->
      <section class="screen hidden" id="timerScreen">
        <div class="errorToast" id="errorToast"></div>

        <div class="timerHeader">
          <div>
            <div class="timerLabel">Duration</div>
            <div class="timerValue" id="durationText">—</div>
          </div>
          <div style="text-align:right;">
            <div class="timerLabel">Progress</div>
            <div class="timerValue" id="progressText">0%</div>
          </div>
        </div>

        <div class="field" id="field">
          <div class="piles">
            <div class="pileBox">
              <div class="binLabel">Top Pile</div>
              <div class="stack top" id="topStack"></div>
            </div>
            <div class="pileBox">
              <div class="binLabel">Bottom Pile</div>
              <div class="stack bottom" id="bottomStack"></div>
            </div>
          </div>
          <div class="hint" id="hint">Press START</div>
        </div>

        <div class="controls">
          <button class="primary" id="startBtn">START</button>
          <button class="ghost" id="backBtn">BACK</button>
        </div>

        <div class="overlay hidden" id="finishOverlay">
          <div class="overlayCard">
            <div class="overlayTitle">Time's Up</div>
            <div class="overlaySub">All blocks have fallen.</div>
            <div class="overlayButtons">
              <button class="primary" id="restartBtn">RESTART</button>
              <button class="ghost" id="backBtn2">BACK</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

<script>
(() => {
  // ===== Error display (so "doesn't work" becomes diagnosable) =====
  const errorToast = document.getElementById("errorToast");
  function showError(msg){
    errorToast.style.display = "block";
    errorToast.textContent = "ERROR:\n" + msg;
  }
  window.addEventListener("error", (e) => {
    showError(e.message + (e.filename ? `\n${e.filename}:${e.lineno}` : ""));
  });
  window.addEventListener("unhandledrejection", (e) => {
    showError(String(e.reason || e));
  });

  // ===== Config =====
  const BLOCK_COUNT = 40;      // fewer blocks = more stable visually on small screens
  const MIN_FALL_MS = 220;

  const DURATIONS = [
    { label: "30 sec", seconds: 30 },
    { label: "60 sec", seconds: 60 },
    { label: "120 sec", seconds: 120 },
    { label: "150 sec", seconds: 150 },
    { label: "180 sec", seconds: 180 },
    { label: "5 min", seconds: 300 },
    { label: "10 min", seconds: 600 },
  ];

  // ===== Elements =====
  const statusText = document.getElementById("statusText");
  const settingsScreen = document.getElementById("settingsScreen");
  const timerScreen = document.getElementById("timerScreen");

  const durationGrid = document.getElementById("durationGrid");
  const durationText = document.getElementById("durationText");
  const progressText = document.getElementById("progressText");

  const field = document.getElementById("field");
  const topStack = document.getElementById("topStack");
  const bottomStack = document.getElementById("bottomStack");
  const hint = document.getElementById("hint");

  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");
  const backBtn2 = document.getElementById("backBtn2");
  const restartBtn = document.getElementById("restartBtn");
  const finishOverlay = document.getElementById("finishOverlay");

  // ===== State =====
  let selectedSeconds = null;
  let running = false;
  let finished = false;

  let blocksFallen = 0;
  let rafId = null;

  let startTime = 0;
  let dropEvery = 0;
  let nextDrop = 0;

  // ===== Helpers =====
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const pad2 = n => String(n).padStart(2,"0");

  function formatDuration(sec){
    if (sec < 60) return `${sec} sec`;
    const m = Math.floor(sec/60);
    const s = sec%60;
    if (s === 0) return `${m} min`;
    return `${m}:${pad2(s)}`;
  }

  function setStatus(s){ statusText.textContent = s; }

  function updateProgress(){
    const pct = Math.round((blocksFallen / BLOCK_COUNT) * 100);
    progressText.textContent = `${pct}%`;
  }

  function stop(){
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function resetStacks(){
    stop();
    finished = false;
    blocksFallen = 0;
    nextDrop = 0;
    topStack.innerHTML = "";
    bottomStack.innerHTML = "";

    for(let i=0;i<BLOCK_COUNT;i++){
      const b = document.createElement("div");
      b.className = "block";
      topStack.appendChild(b);
    }
    updateProgress();
    hint.textContent = "Press START";
    hint.classList.remove("hidden");
    finishOverlay.classList.add("hidden");
    setStatus("READY");
  }

  function showSettings(){
    stop();
    selectedSeconds = null;
    settingsScreen.classList.remove("hidden");
    timerScreen.classList.add("hidden");
    setStatus("READY");
  }

  function showTimer(sec){
    stop();
    errorToast.style.display = "none";
    selectedSeconds = sec;
    settingsScreen.classList.add("hidden");
    timerScreen.classList.remove("hidden");
    durationText.textContent = formatDuration(sec);
    resetStacks();
  }

  function finish(){
    stop();
    running = false;
    finished = true;
    setStatus("DONE");
    finishOverlay.classList.remove("hidden");
  }

  function dropOne(){
    if (!running) return;
    if (nextDrop >= BLOCK_COUNT) return;

    const block = topStack.lastElementChild;
    if (!block) { finish(); return; }

    // Safe geometry (avoid NaN)
    const fieldRect = field.getBoundingClientRect();
    const topRect = topStack.getBoundingClientRect();
    const bottomRect = bottomStack.getBoundingClientRect();

    const fieldH = fieldRect.height;
    if (!fieldH || !isFinite(fieldH)){
      // If layout not ready, retry next frame
      return;
    }

    // Create falling block at a stable "spawn" position under the top label
    const falling = document.createElement("div");
    falling.className = "falling";

    const spawnY = clamp((topRect.top - fieldRect.top) + 18, 12, fieldH - 24);
    falling.style.top = spawnY + "px";
    field.appendChild(falling);

    // Remove from top pile immediately
    block.remove();

    // Compute target landing Y based on how many have already landed
    const blockSize = parseFloat(getComputedStyle(falling).height) || 16;
    const gap = 6;

    const bottomInsideTop = (bottomRect.top - fieldRect.top);
    const bottomInsideBottom = (bottomRect.bottom - fieldRect.top);

    // land near bottom edge, stacked upward
    const targetY = clamp(
      bottomInsideBottom - (blockSize + gap) * (blocksFallen + 1),
      bottomInsideTop + 10,
      fieldH - blockSize - 10
    );

    const fallMs = clamp(dropEvery * 0.6, MIN_FALL_MS, 600);
    falling.style.transition = `top ${fallMs}ms cubic-bezier(.2,.9,.2,1)`;

    // trigger transition
    void falling.offsetHeight;
    falling.style.top = targetY + "px";

    setTimeout(() => {
      // add landed block
      const landed = document.createElement("div");
      landed.className = "block";
      bottomStack.appendChild(landed);

      falling.remove();

      blocksFallen++;
      nextDrop++;
      updateProgress();

      if (blocksFallen >= BLOCK_COUNT) finish();
    }, fallMs + 20);
  }

  function loop(t){
    if (!running) return;

    const elapsed = t - startTime;
    const shouldDrop = Math.floor(elapsed / dropEvery);

    while (nextDrop <= shouldDrop && nextDrop < BLOCK_COUNT){
      dropOne();
    }
    rafId = requestAnimationFrame(loop);
  }

  function start(){
    if (!selectedSeconds) return;
    if (running) return;

    if (finished){
      resetStacks();
    }

    running = true;
    finished = false;
    setStatus("RUNNING");
    hint.classList.add("hidden");
    finishOverlay.classList.add("hidden");

    dropEvery = (selectedSeconds * 1000) / BLOCK_COUNT;
    startTime = performance.now();
    nextDrop = 0;

    // first drop immediately
    dropOne();
    rafId = requestAnimationFrame(loop);
  }

  // ===== Build UI =====
  function buildDurationButtons(){
    durationGrid.innerHTML = "";
    DURATIONS.forEach(d => {
      const btn = document.createElement("button");
      btn.textContent = d.label.toUpperCase();
      btn.addEventListener("click", () => showTimer(d.seconds));
      durationGrid.appendChild(btn);
    });
  }

  // ===== Events =====
  startBtn.addEventListener("click", start);
  backBtn.addEventListener("click", showSettings);
  backBtn2.addEventListener("click", showSettings);
  restartBtn.addEventListener("click", () => { resetStacks(); start(); });

  // If tab hidden, stop to avoid drift
  document.addEventListener("visibilitychange", () => {
    if (document.hidden && running){
      stop();
      running = false;
      setStatus("PAUSED");
      hint.textContent = "Paused (tab hidden)";
      hint.classList.remove("hidden");
    }
  });

  // ===== Init =====
  buildDurationButtons();
  showSettings();
})();
</script>
</body>
</html>
