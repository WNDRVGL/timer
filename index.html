<head>

  <title>Pixel Hourglass Timer</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.65);
      --soft:rgba(255,255,255,.18);
    }
    html,body{
      margin:0;
      height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Always smartphone-sized layout even on PC */
    .phone {
      width: min(420px, 100vw);
      height: 100vh;
      margin: 0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      padding: 18px 14px calc(18px + env(safe-area-inset-bottom));

    .canvasWrap{

      align-items:center;
      justify-content:center;

    /* 900px square internally; scale down to fit phone */

<body>
  <div class="phone">

    <!-- Screen: Select duration -->
    <section id="screenSelect" class="screen active" aria-label="タイマー選択">
      <div class="title">PIXEL HOURGLASS TIMER</div>
      <div class="grid" role="list">
        <button class="timeBtn" data-sec="60">60秒</button>
        <button class="timeBtn" data-sec="120">120秒</button>
        <button class="timeBtn" data-sec="150">150秒</button>
        <button class="timeBtn" data-sec="180">180秒</button>
        <button class="timeBtn" data-sec="300">5分</button>
        <button class="timeBtn" data-sec="600">10分</button>
      </div>
      <div class="hint">時間をタップすると砂時計へ</div>
    </section>

    <!-- Screen: Hourglass -->
    <section id="screenTimer" class="screen" aria-label="砂時計">
      <div class="canvasWrap">
        <div id="glassWrap" class="glassWrap" aria-hidden="true">
          <canvas id="c" width="900" height="900"></canvas>
        </div>

        <!-- Controls -->
        <div id="controls" class="controls">
          <button id="btnStart" class="ctrlBtn" type="button">START</button>
          <button id="btnStop" class="ctrlBtn" type="button">STOP</button>
          <button id="btnBack" class="ctrlBtn" type="button">BACK</button>
        </div>
      </div>
    </section>

  </div>

  <script>
  (() => {
    // ========== DOM ==========
    const screenSelect = document.getElementById('screenSelect');
    const screenTimer  = document.getElementById('screenTimer');
    const glassWrap    = document.getElementById('glassWrap');
    const controls     = document.getElementById('controls');
    const btnStart     = document.getElementById('btnStart');
    const btnStop      = document.getElementById('btnStop');
    const btnBack      = document.getElementById('btnBack');

    const canvas       = document.getElementById('c');
    const ctx          = canvas.getContext('2d', { alpha:false });

    // ========== Constants ==========
    const SIZE = 900;
    const PX   = 4;              // 4x4 pixels
    const STEP = PX;

    const DURATIONS = [60,120,150,180,300,600];

    // Geometry
    const pad = 70;
    const topY = pad;
    const botY = SIZE - pad;
    const midY = SIZE/2;
    const cx = SIZE/2;

    const maxHalf = (SIZE - pad*2)/2;
    const neckW = 56;
    const neckHalf = neckW/2;
    const neckH = 110;
    const neckTop = midY - neckH/2;
    const neckBot = midY + neckH/2;

    // Simulation tuning
    // NOTE: Falling direction is inverted (UPWARD).
    const gravity = -1600;       // px/s^2 (negative => up)
    const vyCap = 1900;
    const vxCap = 260;

    // ========== State ==========
    let selectedSec = 150;

    let running = false;
    let flipping = false;
    let flipped = false;

    let startTs = 0;
    let endTs = 0;

    // moving blocks
    const falling = [];          // {x,y,vx,vy}

    // occupancy for the TARGET pile (TOP chamber, because flow is bottom -> top)
    const occTop = new Set();
    let topSettled = 0;

    // "inventory" in the source chamber (BOTTOM)
    let bottomRemaining = 0;

    // total blocks to move per run
    let TOTAL = 0;

    // release control to guarantee completion by selectedSec
    let released = 0;
    let releaseAcc = 0;

    // ========== Helpers ==========
    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    const now = () => performance.now();

    function showScreen(which){
      if(which === 'select'){
        screenSelect.classList.add('active');
        screenTimer.classList.remove('active');
      }else{
        screenSelect.classList.remove('active');
        screenTimer.classList.add('active');
      }
    }

    function snap(v){ return Math.round(v / STEP) * STEP; }

    function xBoundsAtY(y){
      let half;
      if (y <= midY){
        const tt = (y - topY) / (midY - topY);
        half = maxHalf - (maxHalf - neckHalf) * tt;
      } else {
        const tt = (y - midY) / (botY - midY);
        half = neckHalf + (maxHalf - neckHalf) * tt;
      }
      return { lx: cx - half, rx: cx + half };
    }

    function inGlass(x,y){
      if(y < topY || y > botY) return false;
      const b = xBoundsAtY(y);
      return (x >= b.lx && x <= b.rx);
    }

    function inNeck(x,y){
      return (y >= neckTop && y <= neckBot && Math.abs(x - cx) <= neckHalf);
    }

    function roundRectStroke(x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,  x+w,y+h, r);
      ctx.arcTo(x+w,y+h,x,  y+h, r);
      ctx.arcTo(x,  y+h,x,  y,   r);
      ctx.arcTo(x,  y,  x+w,y,   r);
      ctx.closePath();
      ctx.stroke();
    }

    function drawOutline(){
      ctx.fillStyle = "#000";
      ctx.fillRect(0,0,SIZE,SIZE);

      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // frame
      roundRectStroke(18, 18, SIZE-36, SIZE-36, 44);

      // hourglass border
      ctx.beginPath();
      ctx.moveTo(xBoundsAtY(topY).lx, topY);
      ctx.lineTo(xBoundsAtY(midY).lx, midY);
      ctx.lineTo(xBoundsAtY(botY).lx, botY);
      ctx.lineTo(xBoundsAtY(botY).rx, botY);
      ctx.lineTo(xBoundsAtY(midY).rx, midY);
      ctx.lineTo(xBoundsAtY(topY).rx, topY);
      ctx.closePath();
      ctx.stroke();

      // neck lines
      ctx.beginPath();
      ctx.moveTo(cx - neckHalf, neckTop);
      ctx.lineTo(cx + neckHalf, neckTop);
      ctx.moveTo(cx - neckHalf, neckBot);
      ctx.lineTo(cx + neckHalf, neckBot);
      ctx.stroke();

      // subtle chamber divider feel
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.moveTo(xBoundsAtY(midY-6).lx, midY-6);
      ctx.lineTo(cx - neckHalf, midY-6);
      ctx.moveTo(cx + neckHalf, midY-6);
      ctx.lineTo(xBoundsAtY(midY-6).rx, midY-6);
      ctx.moveTo(xBoundsAtY(midY+6).lx, midY+6);
      ctx.lineTo(cx - neckHalf, midY+6);
      ctx.moveTo(cx + neckHalf, midY+6);
      ctx.lineTo(xBoundsAtY(midY+6).rx, midY+6);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // --- Top pile: "sand" physics with sideways slump (cellular-like) ---
    // Gravity direction for the PILE should feel like normal gravity inside that chamber.
    // Since we are filling the TOP chamber, "gravity" means blocks want to go DOWN within the TOP chamber
    // and will slide diagonally to make a slope.
    function settleInTopWithSlump(x,y){
      // snap
      let sx = snap(x);
      let sy = snap(y);

      // Keep inside TOP chamber
      if(sy > neckTop - 8) sy = snap(neckTop - 8);
      if(sy < topY + 8) sy = snap(topY + 8);

      // Clamp X to glass at this Y
      const b = xBoundsAtY(sy + PX/2);
      const minX = snap(b.lx + 10);
      const maxX = snap(b.rx - 10);
      sx = clamp(sx, minX, maxX);

      // Drop DOWN (toward neck) until we hit another block or boundary (normal gravity)
      // i.e. sy increases while still in TOP chamber.
      while(true){
        const key = `${sx},${sy}`;
        if(!inGlass(sx+PX/2, sy+PX/2) || sy >= neckTop - PX - 8){
          sy = snap(neckTop - PX - 8);
          break;
        }
        if(occTop.has(key)){
          sy -= STEP; // if occupied, move up a cell
          continue;
        }

        const belowY = sy + STEP;
        const belowKey = `${sx},${belowY}`;
        const belowInside = (belowY <= neckTop - PX - 8) && inGlass(sx+PX/2, belowY+PX/2);
        if(!belowInside || occTop.has(belowKey)){
          break;
        }
        sy = belowY;
      }

      // Place
      let placedKey = `${sx},${sy}`;
      if(!occTop.has(placedKey)){
        occTop.add(placedKey);
        topSettled++;
      } else {
        // nudge sideways if rare collision
        for(const dx of [STEP, -STEP, STEP*2, -STEP*2]){
          const nx = sx + dx;
          const nk = `${nx},${sy}`;
          if(!occTop.has(nk) && inGlass(nx+PX/2, sy+PX/2) && sy <= neckTop - PX - 8){
            occTop.add(nk);
            topSettled++;
            sx = nx;
            placedKey = nk;
            break;
          }
        }
      }

      // Slump: if diagonals are open below, slide randomly left/right
      // This makes the pile "崩れていく" 느낌.
      // We run a few relaxation steps to emulate granular slope.
      let rx = sx, ry = sy;
      for(let k=0; k<28; k++){
        const downY = ry + STEP;
        if(downY > neckTop - PX - 8) break;

        const leftX  = rx - STEP;
        const rightX = rx + STEP;

        const downKey  = `${rx},${downY}`;
        const dlKey    = `${leftX},${downY}`;
        const drKey    = `${rightX},${downY}`;

        const canDown = !occTop.has(downKey) && inGlass(rx+PX/2, downY+PX/2);
        const canDL   = !occTop.has(dlKey)   && inGlass(leftX+PX/2, downY+PX/2);
        const canDR   = !occTop.has(drKey)   && inGlass(rightX+PX/2, downY+PX/2);

        if(canDown){
          // fall straight down (rare because we already dropped, but allow for post-slide holes)
          occTop.delete(`${rx},${ry}`);
          ry = downY;
          occTop.add(`${rx},${ry}`);
          continue;
        }

        if(canDL || canDR){
          const chooseLeft = canDL && canDR ? (Math.random() < 0.5) : canDL;
          const nx = chooseLeft ? leftX : rightX;

          // remove current, move to diagonal down
          occTop.delete(`${rx},${ry}`);
          rx = nx;
          ry = downY;
          occTop.add(`${rx},${ry}`);
          continue;
        }

        break; // stable
      }
    }

    // ========== Initial state in timer screen ==========
    // Spec: timer screen initial is "sand at bottom" (unchanged visually).
    // We create TOTAL based on a packed bottom pile, but we do NOT simulate bottom pile blocks individually.
    // We just store bottomRemaining count and draw it as a packed mass.
    function computeTotalFromBottomPacked(){
      // Determine how many blocks fit in a nice bottom pile (bounded & capped)
      const maxBlocks = 1800;
      const yStart = botY - 14;
      const yEnd   = neckBot + 12;

      let count = 0;
      for(let y = yStart; y >= yEnd && count < maxBlocks; y -= STEP){
        const b = xBoundsAtY(y);
        const lx = snap(b.lx + 12);
        const rx = snap(b.rx - 12);
        for(let x = lx; x <= rx && count < maxBlocks; x += STEP){
          const sx = snap(x);
          const sy = snap(y);
          if(!inGlass(sx+PX/2, sy+PX/2)) continue;
          if(sy < neckBot + 8) continue; // bottom chamber only
          count++;
        }
      }
      return count;
    }

    // Draw bottom pile mass (packed) for display (no occupancy tracking needed)
    function drawBottomMass(count){
      if(count <= 0) return;

      ctx.fillStyle = "#fff";
      const yStart = botY - 14;
      const yEnd   = neckBot + 12;

      let drawn = 0;
      for(let y = yStart; y >= yEnd && drawn < count; y -= STEP){
        const b = xBoundsAtY(y);
        const lx = snap(b.lx + 12);
        const rx = snap(b.rx - 12);
        for(let x = lx; x <= rx && drawn < count; x += STEP){
          const sx = snap(x);
          const sy = snap(y);
          if(!inGlass(sx+PX/2, sy+PX/2)) continue;
          ctx.fillRect(sx, sy, PX, PX);
          drawn++;
        }
      }
    }

    function drawTopPile(){
      ctx.fillStyle = "#fff";
      for(const key of occTop){
        const [x,y] = key.split(',').map(Number);
        ctx.fillRect(x, y, PX, PX);
      }
    }

    function drawFalling(){
      ctx.fillStyle = "#fff";
      for(const b of falling){
        ctx.fillRect(b.x, b.y, PX, PX);
      }
    }

    function render(){
      drawOutline();

      if(!running){
        // idle: show ALL sand at bottom (spec)
        drawBottomMass(TOTAL);
      } else {
        // running: show remaining at bottom + moved/settled at top + falling stream
        drawBottomMass(bottomRemaining);
        drawTopPile();
        drawFalling();
      }
    }

    // ========== Flow (direction inverted: bottom -> top) ==========
    function emitOneUpward(){
      if(bottomRemaining <= 0) return;

      // Spawn near neck opening but in bottom chamber, so it "rises" through neck.
      const xJ = (Math.random() - 0.5) * (neckW * 0.55);
      const x = snap(cx + xJ);
      const y = snap(neckBot + 22 + Math.random()*36);

      falling.push({
        x: clamp(x, 0, SIZE-PX),
        y: clamp(y, 0, SIZE-PX),
        vx: (Math.random()-0.5) * 60,
        vy: 0
      });

      bottomRemaining--;
      released++;
    }

    function beginRun(){
      running = true;

      const t = now();
      startTs = t;
      endTs = t + selectedSec * 1000;

      // reset top chamber pile
      occTop.clear();
      topSettled = 0;

      // bottom has all sand to start (we will move it to top)
      bottomRemaining = TOTAL;

      falling.length = 0;
      released = 0;
      releaseAcc = 0;

      // Controls: show STOP/BACK during run, hide START
      btnStart.classList.add('hidden');
      btnStop.classList.remove('hidden');
      btnBack.classList.remove('hidden');
    }

    function stopRun(keepScene=true){
      running = false;
      flipping = false;

      // settle any remaining falling blocks quickly into top (so it doesn't look "stuck")
      for(const b of falling){
        // settle at its current x around top chamber (insert with slump)
        settleInTopWithSlump(b.x, Math.min(b.y, neckTop - 20));
      }
      falling.length = 0;

      // If we ended naturally (or STOP), keep current top pile.
      // When idle spec wants "sand at bottom", but you asked STOP button on timer:
      // We'll keep the current scene when STOP, and show START again so you can flip/run again.
      // If you want STOP to reset to bottom-full, replace keepScene=true with false in STOP handler.
      if(!keepScene){
        occTop.clear();
        topSettled = 0;
      }

      // Controls: show START + BACK, hide STOP
      btnStart.classList.remove('hidden');
      btnStop.classList.add('hidden');
      btnBack.classList.remove('hidden');
    }

    function update(dt){
      if(!running) return;

      // Release rate so all blocks move within selectedSec
      const rate = TOTAL / selectedSec; // blocks/sec
      releaseAcc += rate * dt;
      while(releaseAcc >= 1 && bottomRemaining > 0){
        emitOneUpward();
        releaseAcc -= 1;
      }

      // Update falling blocks (move upward)
      for(let i = falling.length - 1; i >= 0; i--){
        const b = falling[i];

        // gravity upward
        b.vy = clamp(b.vy + gravity * dt, -vyCap, vyCap);

        // steer into neck while below it (since we are going up)
        if(b.y > neckBot){
          b.vx += (cx - (b.x + PX/2)) * 0.6 * dt;
        }

        // constrain in neck
        if(inNeck(b.x + PX/2, b.y + PX/2)){
          b.x = clamp(b.x, cx - neckHalf + 2, cx + neckHalf - PX - 2);
          b.vy = Math.min(b.vy, -650); // keep it moving up
          b.vx *= 0.6;
        }

        // integrate
        b.vx = clamp(b.vx + (Math.random()-0.5) * 40 * dt, -vxCap, vxCap);
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // side walls
        const bb = xBoundsAtY(b.y + PX/2);
        const minX = bb.lx + 10;
        const maxX = bb.rx - 10 - PX;
        b.x = clamp(b.x, minX, maxX);

        // Reached the top chamber region: settle when entering upper area and approaching top pile
        if(b.y <= neckTop - 12){
          // settle into top pile with slump (gravity-like sideways crumble)
          settleInTopWithSlump(b.x, b.y);
          falling.splice(i,1);
          continue;
        }

        // if it goes out of bounds (very top), settle
        if(b.y < topY + 8){
          settleInTopWithSlump(b.x, topY + 14);
          falling.splice(i,1);
          continue;
        }
      }

      const t = now();
      const allMoved = (bottomRemaining === 0) && (falling.length === 0);

      if(t >= endTs || allMoved){
        // dump any remaining bottom blocks instantly into top pile to guarantee completion
        while(bottomRemaining > 0){
          const xJ = (Math.random() - 0.5) * (maxHalf * 0.9);
          settleInTopWithSlump(cx + xJ, neckTop - 40);
          bottomRemaining--;
        }
        stopRun(true);
      }
    }

    // Main loop
    let last = now();
    function tick(){
      const t = now();
      const dt = clamp((t - last) / 1000, 0, 0.033);
      last = t;
      update(dt);
      render();
      requestAnimationFrame(tick);
    }

    // Flip + start
    function startWithFlip(){
      if(flipping || running) return;
      flipping = true;

      flipped = !flipped;
      glassWrap.classList.toggle('flipped', flipped);

      const onDone = () => {
        glassWrap.removeEventListener('transitionend', onDone);
        beginRun();
        flipping = false;
      };
      glassWrap.addEventListener('transitionend', onDone, { once:true });

      setTimeout(() => {
        if(flipping){
          try { glassWrap.removeEventListener('transitionend', onDone); } catch(e){}
          beginRun();
          flipping = false;
        }
      }, 700);
    }

    // ========== UI wiring ==========
    document.querySelectorAll('.timeBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sec = Number(btn.dataset.sec);
        if(!DURATIONS.includes(sec)) return;
        selectedSec = sec;

        showScreen('timer');

        // (Re)initialize hourglass: idle view shows sand at bottom
        TOTAL = computeTotalFromBottomPacked();
        bottomRemaining = TOTAL;
        occTop.clear();
        falling.length = 0;
        topSettled = 0;

        running = false;
        flipping = false;

        // Controls initial: START + BACK visible, STOP hidden
        btnStart.classList.remove('hidden');
        btnStop.classList.add('hidden');
        btnBack.classList.remove('hidden');

        render();
      }, { passive:true });
    });

    // START
    btnStart.addEventListener('click', () => {
      startWithFlip();
    }, { passive:true });

    // STOP (stop where it is; keeps the current scene and shows START again)
    btnStop.addEventListener('click', () => {
      if(running) stopRun(true);
    }, { passive:true });

    // BACK (go back to time select)
    btnBack.addEventListener('click', () => {
      running = false;
      flipping = false;
      showScreen('select');
    }, { passive:true });

    // prevent scroll on mobile
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive:false });

    // Init
    tick();
  })();
  </script>
</body>
</html>
```
